version: '3.8'

services:
  onyx:
    image: onyxdotapp/onyx-backend:latest
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/onyx
    depends_on:
      - db

  db:
    image: ankane/pgvector:latest
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=cognee
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cognee"]
      interval: 5s
      timeout: 5s
      retries: 5

  cognee:
    build:
      context: .
      dockerfile: Dockerfile.api # <-- Point to the API Dockerfile
    ports:
      - "8001:8000"
    env_file:
      - .env
    volumes:
      - ./.env:/app/.env
      - ./local_tokenizer:/app/local_tokenizer
    depends_on:
      db:
        condition: service_healthy

  cognee-mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp # <-- Point to the MCP Dockerfile
    ports:
      - "8002:8000"
    env_file:
      - .env
    environment:
      - TRANSPORT_MODE=sse
    volumes:
      - ./.env:/app/.env
      - ./local_tokenizer:/app/local_tokenizer
    depends_on:
      db:
        condition: service_healthy
      cognee:
        condition: service_started

  openhands:
    image: docker.openhands.dev/openhands/openhands:1.6
    ports:
      - "3000:3000"
    environment:
      - AGENT_SERVER_IMAGE_REPOSITORY=ghcr.io/openhands/agent-server
      - AGENT_SERVER_IMAGE_TAG=1.15.0-python
      - LOG_ALL_EVENTS=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/.openhands:/.openhands
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - db

volumes:
  pgdata: