version: '3.8'

services:
  onyx:
    image: onyxdotapp/onyx-backend:latest
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/onyx
    depends_on:
      - db

  cognee:
    image: cognee/cognee:latest
    ports:
      - "8001:8000"
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=cognee
    depends_on:
      - db

  cognee-mcp:
    image: cognee/cognee:latest
    ports:
      - "8002:8000"
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=cognee
    depends_on:
      - db
      - cognee

  openhands:
    image: docker.openhands.dev/openhands/openhands:1.6
    ports:
      - "3000:3000"
    environment:
      - AGENT_SERVER_IMAGE_REPOSITORY=ghcr.io/openhands/agent-server
      - AGENT_SERVER_IMAGE_TAG=1.15.0-python
      - LOG_ALL_EVENTS=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/.openhands:/.openhands
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - db

  db:
    image: ankane/pgvector:latest
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=cognee
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: